<p-toast />
<section class="home-container">
  <div class="home-card">
    <form [formGroup]="shortenUrlform" (ngSubmit)="onSubmit()" class="form-wrapper">
      <div class="input-group">
            <input pInputText
                   type="text"
                   id="original-url"
                   name="original-url"
                   placeholder="Enter your URL here"
                   formControlName="originalUrl"
                   [invalid]="isInvalid(shortenUrlform, 'originalUrl')"
                   class="url-input"/>
        <button pButton
                type="submit"
                class="submit-btn"
                [disabled]="shortenUrlform.invalid">
          Shorten
        </button>
      </div>

      @if(isInvalid(shortenUrlform, 'originalUrl')) {
        <div class="error-messages">
          @for(errorMsg of getErrorMessages(shortenUrlform, 'originalUrl'); track errorMsg) {
            <p-message severity="error" size="small" variant="simple">{{ errorMsg }}</p-message>
          }
        </div>
      }
    </form>

    @if(generatedUrl.shortUrlCode) {
      <div class="result-section">
        <p class="result-label">Your shortened URL:</p>
        <div class="result-box">
          <a [href]="generatedUrl.shortUrlCode" target="_blank" class="short-url-link">
            {{ generatedUrl.shortUrlCode }}
          </a>
        </div>
      </div>
    }

    @if(loading()) {
      <div class="loading-section">
        <p-progressspinner strokeWidth="4"></p-progressspinner>
      </div>
    }
  </div>
</section>
