@if (showNavBar()) {
  <div class="w-full bg-white shadow flex items-center justify-between px-4 py-2 navbar-theme">
    <div class="flex items-center gap-3">
      <img src="/logo.png" alt="URL Shortener Logo" class="navbar-logo" />
      <span class="app-title font-bold text-xl text-primary">URL Shortener</span>
    </div>
    <div class="flex items-center gap-4">
      <p-menubar [model]="navLinks"
                 class="w-full md:w-auto bg-transparent border-none shadow-none text-gray-700"></p-menubar>
      <!-- Future: Login button or user avatar -->
    </div>
  </div>
}
